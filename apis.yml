aid: integration-app
name: Integration.app (Membrane)
segments:
  - Integrations
description: >-
  Integration.app, now operating as Membrane (getmembrane.com), is an agentic
  integration infrastructure platform that lets AI agents, products, and
  internal tools connect with 100,000+ applications through a unified
  interface. It exposes integrations via API, CLI, SDK, MCP servers, and
  embedded UI, with managed authentication, observability, self-hosting, and
  enterprise compliance (SOC 2 Type II, GDPR).
type: Index
position: Consumer
access: 3rd-Party
